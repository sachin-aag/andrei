# Bulk HTML sample evaluation (`npm run sample-eval-report`).
#
# API key — add a repository Actions secret:
#   Settings → Secrets and variables → Actions → New repository secret
#
# Recommended name (matches `.env.local` / `evaluate.ts`):
#   GOOGLE_GENERATIVE_AI_API_KEY
#
# Alternative name supported by `@ai-sdk/google` in some setups:
#   AI_GATEWAY_API_KEY — set that secret instead only if your deployment uses Gateway.
#
# Fork pull requests receive no repo secrets — the job skips cleanly unless you configure access.
#
# Committed DOCX bulk samples live in docs/sample_files/ (fixture + optional extras).
#
# Outputs: Artifact "sample-evaluation-report-…" attached to each workflow run
#          (Artifacts tab on the run summary). Retention defaults to repo settings.

name: Sample evaluation HTML report

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: >-
    ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bulk-sample-eval-html:
    name: Bulk sample AI evaluation (HTML artifact)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Check API key secret
        id: key
        run: |
          if [ -z "$GOOGLE_GENERATIVE_AI_API_KEY" ] &&
             [ -z "$AI_GATEWAY_API_KEY" ]; then
            echo "::notice title=Sample eval skipped::Add repository Actions secret GOOGLE_GENERATIVE_AI_API_KEY (Gemini). Fork PRs do not receive upstream secrets."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}

      - name: Install dependencies
        if: steps.key.outputs.skip == 'false'
        run: npm ci

      - name: Run bulk sample evaluation report
        if: steps.key.outputs.skip == 'false'
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
        run: |
          mkdir -p ci-artifacts
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ART="sample_evaluation_report_pr-${{ github.event.pull_request.number }}_${{ github.sha }}.html"
          else
            ART="sample_evaluation_report_${GITHUB_REF_NAME//\//_}_${{ github.sha }}.html"
          fi
          echo "Generating ci-artifacts/${ART}"
          npm run sample-eval-report -- \
            --input-dir docs/sample_files \
            --out "ci-artifacts/${ART}"

      - uses: actions/upload-artifact@v4
        if: steps.key.outputs.skip == 'false'
        with:
          name: >-
            sample-evaluation-report-pr-${{ github.event.pull_request.number || github.ref_name }}
          path: ci-artifacts/*.html
          if-no-files-found: warn
          retention-days: 30
