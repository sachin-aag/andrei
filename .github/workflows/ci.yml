name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Lint/typecheck/build only need a parseable DATABASE_URL (not a live DB).
  # E2E uses the service-container Postgres below — never Neon in CI.
  DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@127.0.0.1:5432/ci' }}

jobs:
  lint-typecheck-test-build:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint

      - run: pnpm run typecheck

      - run: pnpm test

      - run: pnpm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # E2E is self-contained: no production GitHub secrets required.
      # - Postgres: service container (not secrets.DATABASE_URL / Neon)
      # - Auth: fixed AUTH_SECRET + ALLOW_TEST_LOGIN (set in playwright.config webServer)
      # - AI: stubbed via ALLOW_TEST_SKIP_* (no Gemini / Langfuse keys needed)
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
      AUTH_SECRET: ci-test-secret-not-for-production-use
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Apply database schema
        run: pnpm exec drizzle-kit push --force

      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      # Browser binaries are cached; apt libs (libgtk-4, gstreamer, …) must install every job.
      - name: Install Playwright browsers and OS dependencies
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      - run: pnpm run test:e2e

      - name: Upload Playwright results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7
